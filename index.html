<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tug-of-Words</title>
    <style>
        :root {
            --primary-font: 'Century Gothic', 'AppleGothic', system-ui, sans-serif;
            --base-font-size: 16px;
            --font-weight: bold;
            --text-dark: #2C3E50; 
            --team1-color: #FF5E7E; --team1-shadow: #C93E5C; --team1-bg: rgba(255, 234, 234, 0.95);
            --team2-color: #00D2FF; --team2-shadow: #0099CC; --team2-bg: rgba(232, 248, 245, 0.95);
            --accent-color: #FFD700; --settings-bg: rgba(240, 243, 244, 0.98);
        }
        html { font-size: var(--base-font-size); }
        body { user-select: none; -webkit-user-select: none; touch-action: none; margin: 0; overflow: hidden; font-family: var(--primary-font); font-weight: var(--font-weight); color: var(--text-dark); text-align: center; height: 100vh; display: flex; flex-direction: column; background-color: #000; }
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; display: none; }
        .bg-layer video, .bg-layer img { width: 100%; height: 100%; object-fit: cover; }
        .css-bg { background: linear-gradient(-45deg, #ff9a9e, #fecfef, #a1c4fd, #c2e9fb); background-size: 400% 400%; animation: gradientBG 15s ease infinite; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        button, input, select { font-family: var(--primary-font); font-weight: var(--font-weight); }
        h1.main-title { color: #ffffff; margin: 15px 0; letter-spacing: 2px; text-shadow: 4px 4px 0 var(--text-dark), -2px -2px 0 var(--text-dark), 2px -2px 0 var(--text-dark), -2px 2px 0 var(--text-dark); z-index: 10; }
        .btn { background-color: var(--accent-color); color: var(--text-dark); border: 5px solid var(--text-dark); padding: 15px 30px; font-size: 1.8em; border-radius: 40px; cursor: pointer; box-shadow: 0 8px 0 var(--text-dark); transition: transform 0.1s, box-shadow 0.1s; margin: 10px; text-transform: uppercase; min-height: 60px; min-width: 60px; }
        .btn:active { transform: translateY(8px); box-shadow: 0 0 0 var(--text-dark); }
        .btn-small { font-size: 1.2em; padding: 10px 20px; border-width: 3px; box-shadow: 0 5px 0 var(--text-dark); min-height: 44px; min-width: 44px;}
        .btn-small:active { transform: translateY(5px); box-shadow: 0 0 0 var(--text-dark); }
        .btn-danger { background-color: #FF4757; color: white; }
        .btn-success { background-color: #2ED573; color: var(--text-dark); }
        .btn-info { background-color: #3498DB; color: white; }
        .screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .active-screen { display: flex; }
        #start-screen { background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(5px); }
        #main-title-display { font-size: 6em; color: white; text-shadow: 6px 6px 0 var(--text-dark); animation: bounce 2s infinite; margin-bottom: 10px; text-transform: uppercase; }
        #subtitle-display { font-size: 2em; color: white; text-shadow: 2px 2px 0 var(--text-dark); margin-bottom: 40px; }
        .footer { position: absolute; bottom: 15px; width: 100%; text-align: center; color: rgba(255, 255, 255, 0.9); font-size: 1.2em; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-30px); } 60% { transform: translateY(-15px); } }
        .panel-box { background: var(--settings-bg); border: 6px solid var(--text-dark); border-radius: 30px; padding: 20px; width: 95%; max-width: 1000px; box-shadow: 0 15px 30px rgba(0,0,0,0.5); max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; }
        .scroll-area { overflow-y: auto; flex: 1; padding: 10px; }
        .team-input-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; justify-content: center; }
        .team-input-row input { font-size: 1.5em; padding: 10px; border: 3px solid var(--text-dark); border-radius: 10px; text-align: center; width: 60%; }
        #vs-display { display: flex; align-items: center; justify-content: center; gap: 30px; margin: 30px 0; }
        .vs-team { font-size: 2.5em; padding: 20px 40px; border-radius: 20px; color: white; border: 6px solid var(--text-dark); }
        .vs-t1 { background: var(--team1-color); box-shadow: 0 10px 0 var(--team1-shadow); }
        .vs-t2 { background: var(--team2-color); box-shadow: 0 10px 0 var(--team2-shadow); }
        .vs-text { font-size: 3em; color: var(--text-dark); font-style: italic; }
        .tabs { display: flex; gap: 10px; overflow-x: auto; border-bottom: 4px solid var(--text-dark); padding-bottom: 10px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 12px; font-size: 1.2em; border: 3px solid var(--text-dark); border-radius: 10px; cursor: pointer; background: #fff; white-space: nowrap; }
        .tab-btn.active { background: var(--accent-color); font-size: 1.3em;}
        .tab-panel { display: none; text-align: left; }
        .tab-panel.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .settings-row { display: flex; justify-content: space-between; align-items: center; gap: 15px; margin-bottom: 15px; background: #fff; padding: 15px; border-radius: 15px; border: 3px solid #dee2e6; }
        .q-card { background: #fff; padding: 15px; border: 3px solid #dee2e6; border-radius: 15px; margin-bottom: 15px; }
        #game-layout { display: flex; width: 100%; flex: 1; justify-content: space-evenly; align-items: center; padding: 15px; box-sizing: border-box; gap: 15px; background: rgba(0,0,0,0.15); }
        .team-column { width: 28%; display: flex; flex-direction: column; align-items: center; padding: 20px 10px; border-radius: 30px; border: 6px solid var(--text-dark); backdrop-filter: blur(8px); }
        #team1 { background: var(--team1-bg); }
        #team2 { background: var(--team2-bg); }
        .team-title { font-size: 2.5em; margin: 0 0 10px 0; color: white; -webkit-text-stroke: 1.5px var(--text-dark); }
        .question-box { background: var(--text-dark); color: #fff; padding: 10px 20px; border-radius: 15px; font-size: 1.3em; margin-bottom: 10px; width: 80%; min-height: 44px; display: flex; align-items: center; justify-content: center; text-align: center; border: 3px solid white; }
        .photo-display { width: 160px; height: 160px; background: white; border: 6px solid var(--text-dark); border-radius: 20px; margin-bottom: 15px; display: flex; justify-content: center; align-items: center; overflow: hidden; box-shadow: 0 10px 0 rgba(0,0,0,0.2); }
        .photo-display img { width: 100%; height: 100%; object-fit: cover; }
        .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .card { background: white; border: 4px solid var(--text-dark); border-radius: 15px; padding: 10px; font-size: 1.3em; cursor: pointer; box-shadow: 0 6px 0 var(--text-dark); min-height: 60px; display: flex; align-items: center; justify-content: center; color: var(--text-dark); }
        .card:active, .card.pressed { transform: translateY(6px); box-shadow: 0 0 0 var(--text-dark) !important; }
        .card.correct { background: #2ED573; color: white; border-color: white; }
        .card.wrong { background: #FF4757; color: white; border-color: white; }
        .card.disabled { opacity: 0.6; pointer-events: none; }
        #arena-container { width: 40%; max-width: 600px; aspect-ratio: 16/10; position: relative; background: #ffffff; border: 4px solid var(--text-dark); border-radius: 30px; overflow: hidden; display: flex; align-items: center; }
        #tug-group { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); z-index: 5; transition: left 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); height: 60%; width: 250%; display: flex; justify-content: center; align-items: center; }
        #tug-group img { height: 100%; width: auto; }
        .burst { position: absolute; top: 50%; width: 150px; height: 150px; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 20; display: none; }
        @keyframes pop { 0% { transform: scale(0); } 80% { transform: scale(1.2); } 100% { transform: scale(1); opacity: 0; } }
        #top-bar { position: absolute; top: 10px; left: 10px; z-index: 200; display: flex; gap: 10px; }
    </style>
</head>
<body>

    <audio id="bgm-audio" loop preload="auto"></audio>
    <div id="yt-container" style="position: absolute; width: 0; height: 0; overflow: hidden; opacity: 0; pointer-events: none;"></div>
    <div id="home-bg-layer" class="bg-layer css-bg"></div>
    <div id="game-bg-layer" class="bg-layer css-bg"></div>

    <div id="top-bar">
        <button class="btn btn-small btn-info" onclick="goHome()">🏠 Menu</button>
        <button class="btn btn-small btn-danger" onclick="abortTournament()" id="abort-btn" style="display:none;">🛑 End</button>
    </div>

    <div id="start-screen" class="screen active-screen">
        <h1 class="main-title" id="main-title-display">TUG-OF-WORDS</h1>
        <h2 id="subtitle-display">A Knowledge-Test Game</h2>
        <button class="btn" onclick="openSetup()">🏆 Start Tournament</button>
        <button class="btn btn-small" style="background:#A8DADC;" onclick="openDashboard()">⚙️ Dashboard</button>
    </div>

    <div id="setup-screen" class="screen" style="background: rgba(0,0,0,0.8);">
        <div class="panel-box" style="align-items: center;">
            <h2>Tournament Setup</h2>
            <div style="font-size: 1.5em; margin-bottom: 20px;">
                Teams: <input type="number" id="team-count" value="4" min="2" max="16" style="width: 80px; text-align: center;">
                <button class="btn btn-small btn-success" onclick="generateTeamInputs()">Set</button>
            </div>
            <div id="team-inputs-container" class="scroll-area" style="width:100%;"></div>
            <button class="btn" onclick="beginTournament()">Let's Go!</button>
        </div>
    </div>

    <div id="status-screen" class="screen" style="background: rgba(0,0,0,0.85);">
        <div class="panel-box">
            <h2 id="round-title" style="font-size: 3em;">Round 1</h2>
            <div id="vs-display">
                <div class="vs-team vs-t1" id="vs-teamA">Team A</div>
                <div class="vs-text">VS</div>
                <div class="vs-team vs-t2" id="vs-teamB">Team B</div>
            </div>
            <button class="btn" onclick="startMatch()">Start Match!</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <h1 class="main-title" id="game-title-display" style="font-size: 2.5em;">Tug-of-Words</h1>
        <div id="game-layout">
            <div id="team1" class="team-column">
                <h2 class="team-title" id="t1-name">Team 1</h2>
                <div class="question-box" id="t1-q"></div>
                <div class="photo-display" id="t1-photo"></div>
                <div class="cards" id="t1-cards"></div>
            </div>
            <div id="arena-container">
                <div id="tug-group"><img id="arena-img" src="" alt="Pulling..."></div>
                <div id="burst-left" class="burst"></div>
                <div id="burst-right" class="burst"></div>
            </div>
            <div id="team2" class="team-column">
                <h2 class="team-title" id="t2-name">Team 2</h2>
                <div class="question-box" id="t2-q"></div>
                <div class="photo-display" id="t2-photo"></div>
                <div class="cards" id="t2-cards"></div>
            </div>
        </div>
    </div>

    <div id="match-win-screen" class="screen" style="background: rgba(0,0,0,0.85);">
        <h1 style="font-size: 6em; color: var(--accent-color);" id="match-winner-text">Team Wins!</h1>
        <button class="btn" onclick="nextTournamentStep()">Continue Tournament</button>
    </div>

    <div id="champion-screen" class="screen" style="background: rgba(255, 215, 0, 0.95);">
        <h1 style="font-size: 6em; color: white;" id="champion-text">🏆 CHAMPION! 🏆</h1>
        <p style="font-size: 4em; color: var(--text-dark);" id="champion-name"></p>
        <button class="btn btn-danger" onclick="goHome()">Finish</button>
    </div>

    <div id="dashboard-screen" class="screen" style="background: rgba(0,0,0,0.7);">
        <div class="panel-box">
            <h2>⚙️ Dashboard</h2>
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('tab-q')">❓ Questions</button>
                <button class="tab-btn" onclick="switchTab('tab-data')">💾 Data</button>
            </div>
            <div class="scroll-area">
                <div id="tab-q" class="tab-panel active">
                    <div id="q-list"></div>
                    <button class="btn btn-small btn-success" style="width:100%;" onclick="addQ()">➕ Add Question</button>
                </div>
                <div id="tab-data" class="tab-panel">
                    <button class="btn btn-small" onclick="forceFetchGitHub()">🌐 Sync from GitHub</button>
                </div>
            </div>
            <button class="btn btn-small" onclick="saveDashboard()">Save & Back</button>
        </div>
    </div>

    <script>
        const FALLBACK_IMG = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100'><rect width='100' height='100' fill='%232C3E50'/><text x='50' y='55' text-anchor='middle' fill='white'>IMG</text></svg>";
        let gData = { winScore: 5, typo: { family: "'Century Gothic', 'AppleGothic', sans-serif", size: 16, color: "#2C3E50" }, texts: { main: "TUG-OF-WORDS", sub: "Game", inGameTitle: "Game" }, bgs: { home: { url: "" }, game: { url: "" } }, backgroundMusic: { url: "", volume: 0.3 }, arena: "tug.png", questions: [{ q: "Example?", img: "", c: "Correct", w: ["W1", "W2", "W3"] }] };
        let activePool = [], nextPool = [], currentMatch = { t1: "", t2: "" }, roundNum = 1, t1Score = 0, t2Score = 0, ropePos = 50, gameActive = false, qIndex1 = 0, qIndex2 = 0;

        async function loadData() {
            const saved = localStorage.getItem('tow_master_data_v3');
            if (saved) gData = JSON.parse(saved);
            applySettings();
        }

        function applySettings() {
            document.documentElement.style.setProperty('--primary-font', gData.typo.family);
            document.getElementById('arena-img').src = gData.arena;
        }

        function shuffle(arr) { let s = [...arr]; for(let i = s.length-1; i>0; i--){ const j = Math.floor(Math.random()*(i+1)); [s[i], s[j]] = [s[j], s[i]]; } return s; }
        function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen')); document.getElementById(id).classList.add('active-screen'); }
        function goHome() { showScreen('start-screen'); }
        function openSetup() { generateTeamInputs(); showScreen('setup-screen'); }
        function generateTeamInputs() { const count = parseInt(document.getElementById('team-count').value); const c = document.getElementById('team-inputs-container'); c.innerHTML = ''; for(let i=1; i<=count; i++) c.innerHTML += `<div class="team-input-row"><input type="text" id="setup-t${i}" value="Team ${i}"></div>`; }
        
        function beginTournament() { const count = parseInt(document.getElementById('team-count').value); let teams = []; for(let i=1; i<=count; i++) teams.push(document.getElementById(`setup-t${i}`).value.trim()); activePool = shuffle(teams); nextPool = []; roundNum = 1; nextTournamentStep(); }
        function nextTournamentStep() { if(activePool.length >= 2) { currentMatch.t1 = activePool.pop(); currentMatch.t2 = activePool.pop(); document.getElementById('vs-teamA').innerText = currentMatch.t1; document.getElementById('vs-teamB').innerText = currentMatch.t2; showScreen('status-screen'); } else if (activePool.length === 1) { nextPool.push(activePool.pop()); setTimeout(() => checkRoundEnd(), 1000); } else { checkRoundEnd(); } }
        function checkRoundEnd() { if(nextPool.length === 1) { document.getElementById('champion-name').innerText = nextPool[0]; showScreen('champion-screen'); } else { activePool = shuffle([...nextPool]); nextPool = []; roundNum++; nextTournamentStep(); } }

        function startMatch() { t1Score = 0; t2Score = 0; ropePos = 50; gameActive = true; qIndex1 = 0; qIndex2 = 0; loadQ(1); loadQ(2); showScreen('game-screen'); }

        function loadQ(tNum) {
            const stack = shuffle(gData.questions);
            const qData = stack[0];
            const qBox = document.getElementById(`t${tNum}-q`);
            qBox.innerText = qData.q;
            const cDiv = document.getElementById(`t${tNum}-cards`); cDiv.innerHTML = '';
            shuffle([qData.c, ...qData.w]).forEach(ch => {
                const card = document.createElement('div'); card.className = 'card'; card.innerText = ch;
                card.onclick = () => { if (!card.classList.contains('disabled')) handleAnswer(tNum, ch, qData.c, card); };
                cDiv.appendChild(card);
            });
        }

        function handleAnswer(tNum, guess, correct, cardEl) {
            if(!gameActive) return;
            cardEl.classList.add('pressed');
            if(guess === correct) {
                cardEl.classList.add('correct');
                if(tNum === 1) t1Score++; else t2Score++;
                ropePos = 50 + (t2Score - t1Score) * (30 / gData.winScore);
                document.getElementById('tug-group').style.left = ropePos + "%";
                document.getElementById(`team${tNum}`).querySelectorAll('.card').forEach(c => c.classList.add('disabled'));
                if(t1Score >= gData.winScore || t2Score >= gData.winScore) { gameActive = false; setTimeout(() => declareMatchWinner(t1Score > t2Score ? currentMatch.t1 : currentMatch.t2), 500); }
                else { setTimeout(() => loadQ(tNum), 500); }
            } else { cardEl.classList.add('wrong'); }
        }

        function declareMatchWinner(name) { nextPool.push(name); showScreen('match-win-screen'); }
        function openDashboard() { renderQList(); showScreen('dashboard-screen'); }
        function switchTab(id) { document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function renderQList() { const c = document.getElementById('q-list'); c.innerHTML = ''; gData.questions.forEach((q, i) => { c.innerHTML += `<div class="q-card"><input type="text" id="q-${i}-t" value="${q.q}"><input type="text" id="q-${i}-c" value="${q.c}"></div>`; }); }
        function saveDashboard() { gData.questions = []; document.querySelectorAll('.q-card').forEach((el, i) => { gData.questions.push({q: el.querySelector(`#q-${i}-t`).value, c: el.querySelector(`#q-${i}-c`).value, w: ["W1", "W2", "W3"]}); }); localStorage.setItem('tow_master_data_v3', JSON.stringify(gData)); goHome(); }
        async function forceFetchGitHub() { const response = await fetch('https://raw.githubusercontent.com/teachercristw/tug-of-war/refs/heads/main/tugofwords.json?nocache=' + new Date().getTime()); if(response.ok) { gData = await response.json(); localStorage.setItem('tow_master_data_v3', JSON.stringify(gData)); location.reload(); } }
        
        loadData();
    </script>
</body>
</html>
